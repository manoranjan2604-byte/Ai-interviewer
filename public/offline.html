<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aperture — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0A0D12;
        font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #E7EAF0;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: #12161F;
        border: 1px solid #232838;
        border-radius: 20px;
        padding: 40px 32px;
        max-width: 360px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        border: 2px solid #4CE0D2;
        color: #4CE0D2;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { font-size: 14px; color: #8B93A7; margin: 0 0 20px; line-height: 1.5; }
      button {
        background: #4CE0D2;
        color: #0A0D12;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="26" height="26">
          <circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="16" cy="16" r="4" fill="currentColor"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Aperture needs an internet connection to join calls, run interviews, and generate reports. Pages you've already visited may still be available.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
